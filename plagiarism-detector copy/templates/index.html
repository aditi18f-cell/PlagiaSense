<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>plagiaSense</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='image/logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header class="header">
    <div class="header-left">
        <div class="logo-box">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="plagiaSense logo">
        </div>
        <div class="header-text">
            <div class="title">plagia<span>Sense</span></div>
            <div class="subtitle">originality detection</div>
        </div>
    </div>
    <div class="header-right">v1.0</div>
</header>

<main class="content">
    <label class="field-label" for="inputText">input text</label>
    <textarea id="inputText" placeholder="Paste or type your text here to check for plagiarism…"></textarea>

    <div class="action-row">
        <span class="char-count" id="charCount">0 characters</span>
        <button onclick="checkPlagiarism()">
            <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.3"/>
                <line x1="10.5" y1="10.5" x2="14" y2="14" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            Check plagiarism
        </button>
    </div>

    <hr class="divider">

    <div id="result" class="result-area">
        <div class="idle-state">Results will appear here after analysis</div>
    </div>
</main>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
